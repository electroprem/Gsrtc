
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmedabad → Anand</title>

<style>
body{
    background:#f2f2f7;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    margin:0;
    padding:20px;
    color:#111;
}

.container{
    max-width:600px;
    margin:auto;
}

.header{
    margin-bottom:20px;
}

.header h1{
    margin:0;
    font-size:34px;
}

.time{
    color:gray;
}

.nextBus{
    background:linear-gradient(135deg,#34C759,#30D158);
    color:white;
    border-radius:30px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    margin-bottom:25px;
}

.card{
    background:rgba(255,255,255,.8);
    backdrop-filter:blur(20px);
    border-radius:25px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.busName{
    font-size:22px;
    font-weight:bold;
}

.route{
    color:gray;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
}

.status{
    color:#34C759;
    font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Ahmedabad → Anand</h1>
<div class="time" id="currentTime"></div>
</div>

<div class="nextBus" id="nextBusCard"></div>

<div id="busList"></div>

</div>

<script>

const buses = [

{
name:"GSRTC EXPRESS",
busNo:"GJ18Z-4587",
departure:"05:20 PM",
arrival:"07:05 PM",
duration:"1h 45m",
fare:59,
seats:26
},

{
name:"GSRTC EXPRESS",
busNo:"GJ18Z-5240",
departure:"05:45 PM",
arrival:"06:30 PM",
duration:"45m",
fare:59,
seats:31
},

{
name:"GSRTC GURJARNAGARI",
busNo:"GJ18Z-6248",
departure:"06:05 PM",
arrival:"08:10 PM",
duration:"2h 05m",
fare:59,
seats:42
}

];

function toMinutes(time){
    let d=new Date("01/01/2025 "+time);
    return d.getHours()*60+d.getMinutes();
}

function update(){

    let now=new Date();

    document.getElementById("currentTime").innerHTML=
    now.toLocaleString('en-US',{
        weekday:'long',
        hour:'numeric',
        minute:'2-digit'
    });

    let currentMin=now.getHours()*60+now.getMinutes();

    let nextBus=buses.find(bus=>toMinutes(bus.departure)>=currentMin);

    if(nextBus){

        let diff=toMinutes(nextBus.departure)-currentMin;

        document.getElementById("nextBusCard").innerHTML=
        `
        <div>⭐ NEXT AVAILABLE BUS</div>
        <h2>${nextBus.name}</h2>

        <div>🚌 ${nextBus.busNo}</div>

        <br>

        <div>🕐 ${nextBus.departure} → ${nextBus.arrival}</div>

        <div>⏱ ${nextBus.duration}</div>

        <div>💰 ₹${nextBus.fare}</div>

        <div>🪑 ${nextBus.seats} seats available</div>

        <br>

        <div>Departs in ${diff} min</div>
        `;
    }

    let html="";

    buses.forEach(bus=>{

        html+=`
        <div class="card">

        <div class="busName">
        ${bus.name}
        </div>

        <div class="route">
        Ahmedabad → Anand
        </div>

        <div class="row">
        <div>
        🚌 ${bus.busNo}
        </div>

        <div class="status">
        ₹${bus.fare}
        </div>
        </div>

        <div class="row">
        <div>
        ${bus.departure}
        </div>

        <div>
        ${bus.arrival}
        </div>
        </div>

        <div class="row">
        <div>
        ⏱ ${bus.duration}
        </div>

        <div>
        🪑 ${bus.seats}
        </div>
        </div>

        </div>
        `;
    });

    document.getElementById("busList").innerHTML=html;
}

update();

setInterval(update,60000);

</script>

</body>
</html>
